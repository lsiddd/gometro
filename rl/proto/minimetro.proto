syntax = "proto3";

package rl;

option go_package = "minimetro-go/rl/proto";

// RLEnv exposes a single Mini Metro game instance for RL training.
//
// Typical usage per worker:
//   1. Call Info() once at startup to validate constants.
//   2. Call Reset() to begin an episode and receive the first observation.
//   3. Open a RunEpisode stream: send ActionRequests, receive StepResponses
//      until done=true.  Then call Reset() again for the next episode.
service RLEnv {
  // Info returns environment constants for startup validation.
  rpc Info(Empty) returns (InfoResponse) {}

  // Reset starts a new episode and returns the initial observation.
  rpc Reset(ResetRequest) returns (ResetResponse) {}

  // RunEpisode is a bidirectional stream for the inner training loop.
  // The client sends one ActionRequest per step; the server replies with
  // one StepResponse.  The stream stays open across steps within one episode.
  // When done=true in a StepResponse, call Reset() to begin the next episode
  // (the stream can be reused — send the next action after Reset returns).
  rpc RunEpisode(stream ActionRequest) returns (stream StepResponse) {}

  // Vectorized endpoints for scaling throughput.
  rpc ResetVector(VectorResetRequest) returns (VectorResetResponse) {}
  rpc RunVectorEpisode(stream VectorActionRequest) returns (stream VectorStepResponse) {}
}

// Inference is implemented by the Python inference server (infer.py).
// The Go live-game binary is the client (--rl-client flag).
service Inference {
  rpc Act(ActRequest) returns (ActionResponse) {}
}

message Empty {}

// ── Info ─────────────────────────────────────────────────────────────────────

message InfoResponse {
  int32 obs_dim      = 1;
  repeated int32 action_dims = 2;
  int32 global_dim   = 3;
  int32 station_dim  = 4;
  int32 num_stations = 5;
  int32 line_dim     = 6;
  int32 num_lines    = 7;
}

// ── Reset ─────────────────────────────────────────────────────────────────────

message ResetRequest {
  string city = 1;
  // spawn_rate_factor scales the passenger and station spawn intervals.
  // Values > 1.0 slow spawning (easier); 1.0 = normal difficulty.
  // Used by curriculum learning: the Python side increases this at episode
  // reset when the agent has not yet mastered the current level.
  float spawn_rate_factor = 2;
}

message ResetResponse {
  // Float32 observation vector of length obs_dim, packed.
  repeated float obs  = 1 [packed = true];
  // Boolean action mask of length sum(action_dims), one bool per element.
  repeated bool  mask = 2 [packed = true];
}

// ── Vectorized Endpoints ──────────────────────────────────────────────────────

message VectorResetRequest {
  int32 num_envs = 1;
  string city = 2;
  float spawn_rate_factor = 3;
}

message VectorResetResponse {
  // obs length = num_envs * obs_dim
  repeated float obs  = 1 [packed = true];
  // mask length = num_envs * sum(action_dims)
  repeated bool  mask = 2 [packed = true];
}


// ── RunEpisode ────────────────────────────────────────────────────────────────

message ActionRequest {
  // Four-element MultiDiscrete action: [act_cat, line_idx, station_idx, opt].
  repeated int32 action = 1 [packed = true];
}

message StepResponse {
  repeated float obs  = 1 [packed = true];
  repeated bool  mask = 2 [packed = true];
  double reward       = 3;
  bool   done         = 4;
  // Info fields (subset of the JSON /step info map).
  int32  score                 = 5;
  int32  passengers_delivered  = 6;
  int32  week                  = 7;
  int32  stations              = 8;
  bool   game_over             = 9;
  bool   in_upgrade_modal      = 10;
}

message VectorActionRequest {
  // length = num_envs * 4
  repeated int32 actions = 1 [packed = true];
}

message VectorStepResponse {
  // All vectors are packed and map to the N environments.
  repeated float obs  = 1 [packed = true]; // length = N * obs_dim
  repeated bool  mask = 2 [packed = true]; // length = N * sum(action_dims)
  repeated double reward = 3 [packed = true]; // length = N
  repeated bool   done   = 4 [packed = true]; // length = N

  // SB3 requires the terminal observation when returning an auto-reset obs.
  // When done[i] is true, terminal_obs contains the ending game state.
  // Otherwise, its values are arbitrary (usually 0).
  repeated float terminal_obs = 5 [packed = true]; // length = N * obs_dim

  // Info fields
  repeated int32  score                 = 6 [packed = true];
  repeated int32  passengers_delivered  = 7 [packed = true];
  repeated int32  week                  = 8 [packed = true];
  repeated int32  stations              = 9 [packed = true];
  repeated bool   game_over             = 10 [packed = true];
  repeated bool   in_upgrade_modal      = 11 [packed = true];
}


// ── Inference ────────────────────────────────────────────────────────────────

message ActRequest {
  repeated float obs  = 1 [packed = true];
  repeated bool  mask = 2 [packed = true];
}

message ActionResponse {
  repeated int32 action = 1 [packed = true];
}
