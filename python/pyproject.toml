    "onnxruntime>=1.19",
    "onnxscript>=0.6.2",
    "grpcio>=1.80.0",
    "grpcio-tools>=1.80.0",
]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
]

[tool.pytest.ini_options]
pythonpath = ["."]
